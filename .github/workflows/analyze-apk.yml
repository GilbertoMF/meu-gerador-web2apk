name: Analyze APK (Decompile)

on:
  push:
    paths:
      - 'analyze/**.apk'
  workflow_dispatch:

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Apktool
        run: |
          mkdir -p bin
          wget https://github.com/iBotPeaches/Apktool/releases/download/v3.0.1/apktool_3.0.1.jar -O bin/apktool.jar

      - name: Decompile APK
        run: |
          mkdir -p output
          # Pega o primeiro APK encontrado na pasta analyze/
          APK_FILE=$(ls analyze/*.apk | head -n 1)
          if [ -z "$APK_FILE" ]; then
            echo "Nenhum APK encontrado em analyze/"
            exit 1
          fi
          
          echo "🔍 Descompilando: $APK_FILE"
          java -jar bin/apktool.jar d "$APK_FILE" -o output/decompiled -f

      - name: Zip Result
        run: |
          cd output
          zip -r ../extracted_source.zip decompiled

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-code
          path: extracted_source.zip
