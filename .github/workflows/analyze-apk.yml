name: Analyze APK (Decompile)

on:
  push:
    paths:
      - 'analyze/**.apk'
  workflow_dispatch:

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download JADX
        run: |
          mkdir -p bin
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip -O jadx.zip
          unzip jadx.zip -d bin/jadx
          chmod +x bin/jadx/bin/jadx

      - name: Decompile APK (JADX)
        run: |
          mkdir -p output
          APK_FILE=$(ls analyze/*.apk | head -n 1)
          if [ -z "$APK_FILE" ]; then
            echo "Nenhum APK encontrado em analyze/"
            exit 1
          fi
          
          echo "🔍 Descompilando com JADX: $APK_FILE"
          ./bin/jadx/bin/jadx "$APK_FILE" -d output/decompiled --no-res --export-gradle
          # --no-res if we just want code, but actually resources are good. 
          # Let's keep resources but it might be slower. The user wants "original names".
          # Actually, without --no-res JADX is still great.


      - name: Zip Result
        run: |
          cd output
          zip -r ../extracted_source.zip decompiled

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-code
          path: extracted_source.zip
