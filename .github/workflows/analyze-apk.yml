name: Analyze APK (Decompile)

on:
  push:
    paths:
      - 'analyze/**.apk'
  workflow_dispatch:

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Tools
        run: |
          mkdir -p bin
          # Apktool
          wget https://github.com/iBotPeaches/Apktool/releases/download/v3.0.1/apktool_3.0.1.jar -O bin/apktool.jar
          # JADX
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip -O jadx.zip
          unzip jadx.zip -d bin/jadx
          chmod +x bin/jadx/bin/jadx

      - name: Decompile APK (Hybrid)
        run: |
          mkdir -p output/smali_original
          mkdir -p output/java_source
          APK_FILE=$(ls analyze/*.apk | head -n 1)
          if [ -z "$APK_FILE" ]; then 
            echo "Nenhum APK encontrado"
            exit 1
          fi
          
          echo "🔨 Rodando Apktool (Smali)..."
          java -jar bin/apktool.jar d "$APK_FILE" -o output/smali_original -f
          
          echo "✨ Rodando JADX (Java)..."
          ./bin/jadx/bin/jadx "$APK_FILE" -d output/java_source --no-res --export-gradle



      - name: Zip Result
        run: |
          cd output
          zip -r ../extracted_source.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-code
          path: extracted_source.zip
