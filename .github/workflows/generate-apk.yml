name: Generate APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app-config.json'
      - 'backend/android-template/**'
      - '.github/workflows/generate-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Patch Template and Build
        run: |
          # Configurações padrão
          APP_NAME="Meu App"
          APP_URL="https://google.com"
          PACKAGE_NAME="com.appforge.auto"
          
          # Tenta ler do app-config.json se existir
          if [ -f "app-config.json" ]; then
            APP_NAME=$(jq -r '.appName // "Meu App"' app-config.json)
            APP_URL=$(jq -r '.url // "https://google.com"' app-config.json)
            PACKAGE_NAME=$(jq -r '.packageName // "com.app.auto"' app-config.json)
          fi
          
          echo "🔨 Iniciando Build Automática:"
          echo "   Nome: $APP_NAME"
          echo "   URL: $APP_URL"
          echo "   Package: $PACKAGE_NAME"
          
          # Caminhos dos arquivos de template
          STRINGS_PATH="backend/android-template/app/src/main/res/values/strings.xml"
          MANIFEST_PATH="backend/android-template/app/src/main/AndroidManifest.xml"
          GRADLE_PATH="backend/android-template/app/build.gradle.kts"
          
          # Patch strings.xml (substitui placeholders)
          # Usamos | como delimitador no sed pois a URL contém barras /
          sed -i "s/{{APP_NAME}}/$APP_NAME/g" $STRINGS_PATH
          sed -i "s|{{APP_URL}}|$APP_URL|g" $STRINGS_PATH
          
          # Patch manifest
          sed -i "s/{{PACKAGE_NAME}}/$PACKAGE_NAME/g" $MANIFEST_PATH
          
          # Patch build.gradle
          sed -i "s/{{PACKAGE_NAME}}/$PACKAGE_NAME/g" $GRADLE_PATH
          
          # Refatoração do pacote Java (White-label Definitivo)
          echo "📂 Refatorando pacotes Java para: $PACKAGE_NAME"
          JAVA_BASE="backend/android-template/app/src/main/java"
          OLD_PKG="com/appforge/webview"
          TEMP_DIR="temp_java_files"
          
          mkdir -p $TEMP_DIR
          # Move e patch os arquivos para pasta temporária
          for f in $JAVA_BASE/$OLD_PKG/*.java; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            sed "s/package com.appforge.webview/package $PACKAGE_NAME/g" "$f" > "$TEMP_DIR/$BASENAME"
            sed -i "s/import com.appforge.webview.R/import $PACKAGE_NAME.R/g" "$TEMP_DIR/$BASENAME"
          done
          
          # Limpeza total do caminho antigo e recriação do novo
          rm -rf "$JAVA_BASE/com/appforge"
          NEW_PKG_DIR="$JAVA_BASE/$(echo $PACKAGE_NAME | tr '.' '/')"
          mkdir -p "$NEW_PKG_DIR"
          mv "$TEMP_DIR"/*.java "$NEW_PKG_DIR/"
          rm -rf "$TEMP_DIR"
          
          # Executa o build via Gradle
          cd backend/android-template
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: backend/android-template/app/build/outputs/apk/debug/*.apk
